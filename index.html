<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Livvy</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#f0f0f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 20px;
  -webkit-font-smoothing:antialiased;
}

.wrap{width:100%;max-width:380px;}

/* ── LOGO ── */
.logo{text-align:center;margin-bottom:36px;}

.logo-mark{
  width:64px;height:64px;
  background:#f0f0f0;
  border-radius:18px;
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.5);
}

.logo-mark svg{width:34px;height:34px;}

.logo-name{
  font-size:2rem;font-weight:800;
  letter-spacing:-1px;font-style:italic;
  color:#f0f0f0;line-height:1;margin-bottom:5px;
}

.logo-sub{
  font-size:0.78rem;color:#555;font-weight:500;
  letter-spacing:0.2px;
}

/* ── CARD ── */
.card{
  background:#141414;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:24px 22px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6);
}

/* ── TABS ── */
.tabs{
  display:flex;background:#0a0a0a;
  border-radius:10px;padding:3px;
  margin-bottom:22px;gap:3px;
}
.tab{
  flex:1;padding:9px;background:transparent;border:none;
  border-radius:8px;color:#555;
  font-family:'Inter',sans-serif;font-size:0.83rem;font-weight:600;
  cursor:pointer;transition:all 0.15s;
}
.tab.active{background:#f0f0f0;color:#0a0a0a;font-weight:700;}

/* ── FORM ── */
.fg{margin-bottom:14px;}
.fg label{
  display:block;font-size:0.58rem;font-weight:700;
  letter-spacing:0.6px;text-transform:uppercase;
  color:#555;margin-bottom:5px;
}
.fg input{
  width:100%;background:#0a0a0a;
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:10px;color:#f0f0f0;
  font-family:'Inter',sans-serif;font-size:0.92rem;
  padding:11px 13px;outline:none;
  transition:border-color 0.15s;
  -webkit-appearance:none;
}
.fg input:focus{border-color:rgba(255,255,255,0.3);}
.fg input::placeholder{color:#444;}

/* ── BUTTONS ── */
.btn-main{
  width:100%;padding:13px;
  background:#f0f0f0;
  border:none;border-radius:12px;
  color:#0a0a0a;
  font-family:'Inter',sans-serif;
  font-size:0.92rem;font-weight:800;
  cursor:pointer;
  transition:opacity 0.15s,transform 0.1s;
  margin-top:6px;letter-spacing:-0.2px;
}
.btn-main:active{transform:scale(0.98);opacity:0.85;}
.btn-main:disabled{opacity:0.35;cursor:not-allowed;}


/* ── MESSAGES ── */
.err{
  background:rgba(248,113,113,0.08);
  border:1px solid rgba(248,113,113,0.25);
  border-radius:8px;padding:9px 12px;
  font-size:0.78rem;color:#f87171;
  margin-bottom:14px;display:none;
}
.suc{
  background:rgba(74,222,128,0.08);
  border:1px solid rgba(74,222,128,0.2);
  border-radius:8px;padding:9px 12px;
  font-size:0.78rem;color:#4ade80;
  margin-bottom:14px;display:none;
}

.footer{
  text-align:center;font-size:0.7rem;
  color:#333;margin-top:18px;line-height:1.7;
}

.spin{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(10,10,10,0.2);
  border-top-color:#0a0a0a;border-radius:50%;
  animation:spin 0.6s linear infinite;
  vertical-align:middle;margin-right:5px;
}
@keyframes spin{to{transform:rotate(360deg)}}

#loginForm,#signupForm{display:none;}
#loginForm.active,#signupForm.active{display:block;}
</style>
</head>
<body>

<div class="wrap">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-mark">
      <!-- L monogram for Livvy -->
      <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="4" y="27" font-family="Inter,sans-serif" font-size="26" font-weight="800" font-style="italic" fill="#0a0a0a">L</text>
        <circle cx="27" cy="24" r="4" fill="#0a0a0a" opacity="0.6"/>
      </svg>
    </div>
    <div class="logo-name">Livvy</div>
    <div class="logo-sub">Gig Driver Finance Dashboard</div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="errMsg" class="err"></div>
    <div id="sucMsg" class="suc"></div>

    <!-- LOGIN -->
    <div id="loginForm" class="active">
      <div class="fg">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
      <button class="btn-main" id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm">
      <div class="fg">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your name" autocomplete="name">
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <div class="fg">
        <label>Monthly Earnings Goal ($)</label>
        <input type="number" id="signupGoal" placeholder="e.g. 9500" min="0">
      </div>
      <button class="btn-main" id="signupBtn" onclick="handleSignup()">Create Account</button>
    </div>
  </div>

  <p class="footer">Your data is encrypted and private.</p>
</div>

<script>
const API = window.location.origin;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',(tab==='login'&&i===0)||(tab==='signup'&&i===1));
  });
  document.getElementById('loginForm').classList.toggle('active',tab==='login');
  document.getElementById('signupForm').classList.toggle('active',tab==='signup');
  hide();
}

function showErr(msg){const e=document.getElementById('errMsg');e.textContent=msg;e.style.display='block';document.getElementById('sucMsg').style.display='none';}
function showSuc(msg){const e=document.getElementById('sucMsg');e.textContent=msg;e.style.display='block';document.getElementById('errMsg').style.display='none';}
function hide(){document.getElementById('errMsg').style.display='none';document.getElementById('sucMsg').style.display='none';}

function setLoad(id,on){
  const b=document.getElementById(id);
  if(on){b.disabled=true;b.innerHTML='<span class="spin"></span>Please wait...';}
  else{b.disabled=false;b.innerHTML=id==='loginBtn'?'Sign In':'Create Account';}
}

async function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password) return showErr('Please fill in all fields.');
  setLoad('loginBtn',true);
  try{
    const r=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Login failed');
    localStorage.setItem('pb_token',d.token);
    localStorage.setItem('pb_user',JSON.stringify(d.user));
    window.location.href='/app.html';
  }catch(e){showErr(e.message);setLoad('loginBtn',false);}
}

async function handleSignup(){
  const name=document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  const goal=parseFloat(document.getElementById('signupGoal').value)||9500;
  if(!name||!email||!password) return showErr('Please fill in all fields.');
  if(password.length<8) return showErr('Password must be at least 8 characters.');
  setLoad('signupBtn',true);
  try{
    const r=await fetch(`${API}/api/auth/signup`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,monthly_goal:goal})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Signup failed');
    localStorage.setItem('pb_token',d.token);
    localStorage.setItem('pb_user',JSON.stringify(d.user));
    window.location.href='/app.html';
  }catch(e){showErr(e.message);setLoad('signupBtn',false);}
}

if(localStorage.getItem('pb_token')) window.location.href='/app.html';
</script>
</body>
</html>
